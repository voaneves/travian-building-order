<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travian: Otimizador de Crop & Infraestrutura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @media print { .no-print { display: none !important; } }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0fdf4; /* Um verde muito sutil, remetendo a crop */
            background-image: radial-gradient(#dcfce7 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-8 min-h-screen flex items-start justify-center">

<div class="max-w-6xl w-full glass-card rounded-2xl overflow-hidden border border-emerald-100">
    
    <!-- Cabeçalho -->
    <div class="bg-gradient-to-r from-emerald-600 to-teal-700 p-6 md:p-8 text-white shadow-inner">
        <div class="flex items-center gap-3">
            <span class="text-4xl">🌾</span>
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Otimizador de Capital</h1>
                <p class="text-emerald-100 mt-1 font-medium">Calcule a fila de construção perfeita para maximizar sua produção.</p>
            </div>
        </div>
    </div>

    <div class="p-6 md:p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 no-print">
            
            <!-- Grupo 1: Configurações Básicas -->
            <div class="bg-slate-50 p-5 rounded-xl border border-slate-200">
                <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <span>⚙️</span> Configuração da Aldeia
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Tipo de Aldeia</label>
                        <select id="sel-o0" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm" onchange="seto0(this.value)">
                            <option value="6">6 Campos (Normal)</option>
                            <option value="7">7 Campos</option>
                            <option value="9">9 Campos</option>
                            <option value="15">15 Campos (Crop)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">É a Capital?</label>
                        <select id="sel-o4" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm" onchange="seto4(this.value)">
                            <option value="0">Sim</option>
                            <option value="1">Não</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Tribo Egípcia?</label>
                        <select id="sel-o6" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm" onchange="seto6(this.value)">
                            <option value="0">Não</option>
                            <option value="1">Sim (Aqueduto)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Grupo 2: Oásis -->
            <div class="bg-slate-50 p-5 rounded-xl border border-slate-200">
                <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <span>🌴</span> Bônus de Oásis
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Oásis 1 (Maior %)</label>
                        <select id="sel-o1" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm" onchange="seto1(this.value)">
                            <option value="0">Nenhum</option>
                            <option value=".25">+ 25%</option>
                            <option value=".50">+ 50%</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Oásis 2</label>
                        <select id="sel-o2" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm" onchange="seto2(this.value)">
                            <option value="0">Nenhum</option>
                            <option value=".25">+ 25%</option>
                            <option value=".50">+ 50%</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Oásis 3</label>
                        <select id="sel-o3" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all text-sm" onchange="seto3(this.value)">
                            <option value="0">Nenhum</option>
                            <option value=".25">+ 25%</option>
                            <option value=".50">+ 50%</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Grupo 3: Premium -->
            <div class="bg-amber-50 p-5 rounded-xl border border-amber-200">
                <h2 class="text-sm font-bold text-amber-700 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <span>👑</span> Bônus Premium
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-amber-900 mb-1">Bônus de Ouro (+25%)</label>
                        <select id="sel-o5" class="w-full p-2.5 border border-amber-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-all text-sm" onchange="seto5(this.value)">
                            <option value="1.25">Ativado</option>
                            <option value="1">Desativado</option>
                        </select>
                    </div>
                    
                    <!-- Botão de Ação -->
                    <div class="pt-4 mt-auto">
                        <button type="button" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg transform transition hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 flex justify-center items-center gap-2" onclick="getOrder()">
                            <span>Gerar Fila Perfeita</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="status" class="text-sm font-medium text-emerald-600 mb-3 hidden flex items-center gap-2">
            <svg class="animate-spin h-4 w-4 text-emerald-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Processando os melhores cenários...
        </div>
        
        <div id="demo" class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm hidden">
            <!-- A tabela será gerada aqui -->
        </div>
    </div>
</div>

<script>
// Variáveis Globais de Estado
let o0 = 6, mill = 0, bake = 0, hm = 0, o1 = 0, o2 = 0, o3 = 0, o1p = 0, o2p = 0, o3p = 0, cap = 0, gold = 1.25, waterwork = 0, egypt = 0;

const costs = {
    m: [0, 2560, 4605, 8295, 14925, 26875],
    b: [0, 5150, 9270, 16690, 30035, 54060],
    hm: [0, 114240, 383315, 1595070],
    ww: [0, 3105, 4065, 5325, 6980, 9145, 11975, 15695, 20555, 26925, 35280, 46215, 60545, 79310, 103895, 136105, 178300, 233560, 305965, 400815, 525070]
};

const field = {
    fields: [0, 0, 0, 0, 0, 0],
    values: [3, 7, 13, 21, 31, 46, 70, 98, 140, 203, 280, 392, 525, 691, 889, 1120, 1400, 1820, 2240, 2800, 3430, 4270],
    increase: [0, 4, 6, 8, 10, 15, 24, 28, 42, 63, 77, 112, 133, 168, 196, 231, 280, 420, 420, 560, 630, 840],
    costs: [0, 250, 415, 695, 1165, 1945, 3250, 5425, 9055, 15125, 25255, 42180, 70445, 117650, 196445, 328070, 547880, 914960, 1527985, 2551735, 4261410, 7116555],
    
    lowest: function() { return this.fields[o0 - 1]; },
    highest: function() { return this.fields[0]; },
    uplowest: function() {
        for(let i = 0; i < o0; i++) {
            if (this.fields[i] <= this.lowest()) {
                this.fields[i]++;
                return this.fields[i];
            }
        }
    },
    uphighest: function() { this.fields[0]++; },
    tprod: function() {
        let tprod = 0;
        for(let i = 0; i < o0; i++) {
            tprod += this.values[this.fields[i]];
        }
        return tprod;
    }
};

// Setters
function seto0(val) {
    o0 = parseInt(val);
    field.fields = new Array(o0).fill(0);
}
function seto1(val) { o1 = parseFloat(val); }
function seto2(val) { o2 = parseFloat(val); }
function seto3(val) { o3 = parseFloat(val); }
function seto4(val) { cap = parseInt(val); }
function seto5(val) { gold = parseFloat(val); }
function seto6(val) { egypt = parseInt(val); }

function reset() {
    if (cap === 1) field.costs[11] = 1000000;
    else field.costs[11] = 42180;
    
    seto0(o0);
    hm = 0; mill = 0; bake = 0; o1p = 0; o2p = 0; o3p = 0; waterwork = 0;
}

function totalprod() {
    return field.tprod() * (1 + o1*o1p*(1+waterwork*.05) + o2*o2p*(1+waterwork*.05) + o3*o3p*(1+waterwork*.05) + bake*.05 + mill*.05);
}

function totalprodn(f, m) {
    return (field.tprod() + f) * (1 + o1*o1p*(1+waterwork*.05) + o2*o2p*(1+waterwork*.05) + o3*o3p*(1+waterwork*.05) + bake*.05 + mill*.05 + m);
}

// Formatação para visualização de números grandes
function formatNumber(num) {
    return num.toLocaleString('pt-BR');
}

function getNextStep() {
    let lowest = 0;
    let efflowest = 1000000;
    let temp = 0;
    let costOfAction = 0;
    
    // test lowest field
    if(field.fields[o0-1] <= 10 || cap !== 1) {
        efflowest = field.costs[field.fields[o0-1]+1] / (totalprodn(field.increase[field.fields[o0-1]+1], 0) - totalprod());
    }
    
    // test mill/bake rush if applicable
    if (field.fields[0] < 10) {
        if (field.fields[0] < 5) {
            let tfi = 0, tfc = 0;
            for(let i = field.fields[0]+1; i < 6; i++) {
                tfi += field.increase[i];
                tfc += field.costs[i];
            }
            for(let i=1; i<=5; i++){
                let rushCost = tfc + costs.m[i];
                let rushTemp = rushCost / (totalprodn(tfi, i*0.05) - totalprod());
                if (rushTemp <= efflowest) { efflowest = rushTemp; lowest = 1; }
            }
        }
        else if(field.fields[o0-1] <= 10 || cap === 0) {
            let tfi = 0, tfc = 0, tfm = 0;
            for(let i = field.fields[0]+1; i < 11; i++) {
                tfi += field.increase[i];
                tfc += field.costs[i];
            }
            if (mill < 5) {
                for(let i = mill; i < 5; i++) { tfc += costs.m[i+1]; tfm += 0.05; }
            }
            for(let i=1; i<=5; i++){
                let rushCost = tfc + costs.b[i];
                let rushTemp = rushCost / (totalprodn(tfi, (i*0.05)+tfm) - totalprod());
                if (rushTemp <= efflowest) { efflowest = rushTemp; lowest = 1; }
            }
        }
    }
    
    // test flowermill/bake special case
    if (mill < 5 && field.fields[0] >= 10) {
        let tfi = 0, tfc = 0, tfm = 0;
        for(let i = mill; i < 5; i++) { tfc += costs.m[i+1]; tfm += 0.05; }
        for(let i=1; i<=5; i++){
            let rushCost = tfc + costs.b[i];
            let rushTemp = rushCost / (totalprodn(tfi, (i*0.05)+tfm) - totalprod());
            if (rushTemp <= efflowest) { efflowest = rushTemp; lowest = 2; }
        }
    }
        
    // test mill
    if (field.fields[0] >= 5 && mill < 5) {
        temp = costs.m[mill+1] / (totalprodn(0, .05) - totalprod());
        if (temp <= efflowest) { efflowest = temp; lowest = 2; }
    }
    // test bake
    if (field.highest() >= 10 && bake < 5 && mill === 5) {
        temp = costs.b[bake+1] / (totalprodn(0, .05) - totalprod());
        if (temp <= efflowest) { efflowest = temp; lowest = 3; }
    }
    // test waterworks	
    if (hm >= 10 && egypt === 1) {
        temp = costs.ww[waterwork+1] / (totalprodn(0, o1*o1p*.05 + o2*o2p*.05 + o3*o3p*.05) - totalprod());
        if (temp <= efflowest) { efflowest = temp; lowest = 5; }
    }
    // test oasis	
    if (o1p === 0) {
        temp = costs.hm[1] / (totalprodn(0, o1) - totalprod());
        if (temp <= efflowest) { efflowest = temp; lowest = 41; }
    } else if (o2p === 0) {
        temp = costs.hm[2] / (totalprodn(0, o2) - totalprod());
        if (temp <= efflowest) { efflowest = temp; lowest = 42; }
    } else if (o3p === 0) {
        temp = costs.hm[3] / (totalprodn(0, o3) - totalprod());
        if (temp <= efflowest) { efflowest = temp; lowest = 43; }
    } else if (efflowest === 1000000) {
        return null;
    }
    
    let actionText = "";
    
    if (lowest === 0) {
        if (cap === 1 && field.lowest() === 10) return null;
        let lvl = field.uplowest();
        costOfAction = field.costs[lvl];
        actionText = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-800 border border-emerald-200 shadow-sm">🌾 Upar Crop (Nv. ${lvl})</span>`;
    }
    else if (lowest === 1) {
        if (cap === 1 && field.lowest() === 10) return null;
        field.uphighest();
        costOfAction = field.costs[field.fields[0]];
        actionText = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-800 border border-emerald-200 shadow-sm">🌾 Upar Crop (Nv. ${field.fields[0]})</span>`;
    }
    else if (lowest === 2) {
        mill++;
        costOfAction = costs.m[mill];
        actionText = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-800 border border-blue-200 shadow-sm">⚙️ Moinho (Nv. ${mill})</span>`;
    }
    else if (lowest === 3) {
        bake++;
        costOfAction = costs.b[bake];
        actionText = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-orange-100 text-orange-800 border border-orange-200 shadow-sm">🍞 Padaria (Nv. ${bake})</span>`;
    }
    else if (lowest === 41) {
        o1p = 1; hm = 10; costOfAction = costs.hm[1];
        actionText = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-purple-100 text-purple-800 border border-purple-200 shadow-sm">⚔️ Mansão (Nv. 10) + Oásis 1</span>`;
    }
    else if (lowest === 42) {
        o2p = 1; hm = 15; costOfAction = costs.hm[2];
        actionText = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-purple-100 text-purple-800 border border-purple-200 shadow-sm">⚔️ Mansão (Nv. 15) + Oásis 2</span>`;
    }
    else if (lowest === 43) {
        o3p = 1; hm = 20; costOfAction = costs.hm[3];
        actionText = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-purple-100 text-purple-800 border border-purple-200 shadow-sm">⚔️ Mansão (Nv. 20) + Oásis 3</span>`;
    }
    else if (lowest === 5) {
        waterwork++;
        costOfAction = costs.ww[waterwork];
        actionText = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-cyan-100 text-cyan-800 border border-cyan-200 shadow-sm">💧 Aqueduto (Nv. ${waterwork})</span>`;
    }

    let roiDays = Math.round(efflowest / gold / .24) / 100;
    
    return {
        actionText: actionText,
        roi: roiDays,
        cost: costOfAction
    };
}

function getOrder() {
    const statusDiv = document.getElementById("status");
    const demoDiv = document.getElementById("demo");
    
    statusDiv.style.display = 'flex';
    demoDiv.style.display = 'none';
    
    // Pequeno timeout apenas para dar tempo da UI atualizar e mostrar o loader
    setTimeout(() => {
        reset();
        
        let html = `
            <table class="min-w-full text-left bg-white">
                <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold tracking-wider border-b border-slate-200">
                    <tr>
                        <th class="py-4 px-5 text-center w-12 text-slate-400">#</th>
                        <th class="py-4 px-5">Edifícios <span class="text-[10px] text-slate-400 normal-case block font-normal">(Moinho, Padaria, Mansão, Aqueduto)</span></th>
                        <th class="py-4 px-5">Campos <span class="text-[10px] text-slate-400 normal-case block font-normal">(Níveis)</span></th>
                        <th class="py-4 px-5 text-center">Produção/h</th>
                        <th class="py-4 px-5">Próxima Ação</th>
                        <th class="py-4 px-5 text-center">ROI <span class="text-[10px] text-slate-400 normal-case block font-normal">(Dias)</span></th>
                        <th class="py-4 px-5 text-right bg-amber-50 text-amber-800 border-l border-amber-100" title="Capacidade máxima que você precisa ter no Armazém/Celeiro antes de iniciar a construção">
                            📦 Celeiro Mínimo
                        </th>
                    </tr>
                </thead>
                <tbody class="text-sm divide-y divide-slate-100">
        `;
        
        let i = 0;
        let stepResult;
        
        if (cap === 0) { // Capital
            while(field.lowest() < 21) {
                i++;
                stepResult = getNextStep();
                if(!stepResult) break;
                
                html += generateRowHTML(i, stepResult);
            }
        } else { // Not Capital
            while(field.lowest() < 10 || mill < 5 || bake < 5 || (hm < 10 && o1 !== 0) || (hm < 15 && o1 !== 0 && o2 !== 0) || (hm < 20 && o1 !== 0 && o2 !== 0 && o3 !== 0) || (egypt === 1 && hm >= 10 && waterwork < 20)) {
                i++;
                stepResult = getNextStep();
                if(!stepResult) break;
                
                html += generateRowHTML(i, stepResult);
            }
        }
        
        html += `
                <tr class="bg-emerald-50 border-t-2 border-emerald-200">
                    <td class="py-4 px-5 text-center font-bold text-emerald-600">🎯</td>
                    <td class="py-4 px-5 font-bold text-emerald-700">[${mill}, ${bake}, ${hm}, ${waterwork}]</td>
                    <td class="py-4 px-5 font-mono text-xs font-bold text-emerald-700 break-all">[${field.fields.join(', ')}]</td>
                    <td class="py-4 px-5 text-center font-black text-emerald-600 text-base">${formatNumber(Math.round(totalprod() * gold))}</td>
                    <td class="py-4 px-5 font-bold text-emerald-700" colspan="3">Fila de Construção Concluída com Sucesso!</td>
                </tr>
            </tbody></table>
        `;
        
        demoDiv.innerHTML = html;
        statusDiv.style.display = 'none';
        demoDiv.style.display = 'block';
        
    }, 50);
}

function generateRowHTML(index, stepResult) {
    return `
        <tr class="hover:bg-slate-50 transition duration-150 ease-in-out group">
            <td class="py-3 px-5 text-center text-slate-400 font-medium group-hover:text-slate-600">${index}</td>
            <td class="py-3 px-5 font-medium text-slate-600 whitespace-nowrap">
                <span class="text-blue-500" title="Moinho">${mill}</span>, 
                <span class="text-orange-500" title="Padaria">${bake}</span>, 
                <span class="text-purple-500" title="Mansão">${hm}</span>, 
                <span class="text-cyan-500" title="Aqueduto">${waterwork}</span>
            </td>
            <td class="py-3 px-5 font-mono text-xs text-slate-500 break-all tracking-tight">[${field.fields.join(', ')}]</td>
            <td class="py-3 px-5 text-center font-bold text-emerald-600 bg-emerald-50/30">${formatNumber(Math.round(totalprod() * gold))}</td>
            <td class="py-3 px-5">${stepResult.actionText}</td>
            <td class="py-3 px-5 text-center font-medium text-slate-500">${stepResult.roi}</td>
            <td class="py-3 px-5 text-right font-bold text-amber-700 bg-amber-50/50 border-l border-amber-100">${formatNumber(stepResult.cost)}</td>
        </tr>
    `;
}
</script>
</body>
</html>
